<!DOCTYPE html>
<html lang="lt">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Ievos grįžimas iš Amsterdamo 🛫</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700;900&family=Lato:wght@300;400;700&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box;margin:0;padding:0}
html,body{min-height:100%;background:#060f1e}
body{
  font-family:'Lato',sans-serif;
  color:white;
  min-height:100vh;
  display:flex;
  align-items:center;
  justify-content:center;
  overflow-x:hidden;
}
.app{
  width:100%;
  max-width:640px;
  min-height:100vh;
  padding:2rem 1rem 3rem;
  position:relative;
  display:flex;
  flex-direction:column;
  align-items:center;
  background:radial-gradient(ellipse at 50% 0%, #0d2a50 0%, #060f1e 70%);
}
canvas#stars-c{
  position:fixed;inset:0;width:100%;height:100%;pointer-events:none;z-index:0;
}
.fw-canvas{
  position:fixed;inset:0;width:100%;height:100%;
  pointer-events:none;z-index:100;
}
.content{position:relative;z-index:2;width:100%;display:flex;flex-direction:column;align-items:center}
.title{
  font-family:'Playfair Display',serif;
  font-size:clamp(1.3rem,5vw,2rem);
  color:#ffd700;
  text-align:center;
  margin-bottom:.3rem;
  letter-spacing:-.01em;
  text-shadow:0 0 40px rgba(255,215,0,.35);
}
.subtitle{
  font-size:.85rem;color:rgba(255,255,255,.5);
  text-align:center;margin-bottom:2rem;letter-spacing:.05em;
}
.countdown-row{
  display:flex;gap:.75rem;justify-content:center;
  margin-bottom:2rem;flex-wrap:wrap;
}
.cd-box{
  background:rgba(255,255,255,.06);
  border:1px solid rgba(255,215,0,.25);
  border-radius:14px;
  padding:.7rem .9rem;text-align:center;min-width:68px;
}
.cd-num{
  font-family:'Playfair Display',serif;
  font-size:clamp(1.6rem,6vw,2.2rem);
  font-weight:700;color:#ffd700;line-height:1;
  transition:transform .1s;
}
.cd-num.bump{transform:scale(1.15)}
.cd-label{font-size:.6rem;color:rgba(255,255,255,.45);letter-spacing:.12em;text-transform:uppercase;margin-top:3px}
.map-wrap{width:100%;max-width:560px;margin:0 auto 1.5rem}
.map-wrap svg{width:100%;height:auto;overflow:visible}
.btn-row{
  display:flex;gap:1rem;flex-wrap:wrap;justify-content:center;
  margin-top:1rem;position:relative;min-height:80px;width:100%;
}
.btn-welcome{
  background:linear-gradient(135deg,#ffd700 0%,#ff8c00 100%);
  color:#060f1e;border:none;border-radius:50px;
  padding:.8rem 1.8rem;font-family:'Lato',sans-serif;
  font-weight:700;font-size:.95rem;cursor:pointer;
  box-shadow:0 4px 24px rgba(255,215,0,.4);
  transition:transform .15s,box-shadow .15s;
  letter-spacing:.02em;
}
.btn-welcome:hover{transform:scale(1.06);box-shadow:0 6px 32px rgba(255,215,0,.6)}
.btn-welcome:active{transform:scale(.97)}
.btn-ams-container{position:relative}
.btn-ams{
  background:rgba(255,255,255,.08);
  color:rgba(255,255,255,.6);
  border:1px solid rgba(255,255,255,.2);
  border-radius:50px;
  padding:.8rem 1.8rem;font-family:'Lato',sans-serif;
  font-weight:400;font-size:.95rem;cursor:pointer;
  transition:left .1s ease,top .1s ease;
  white-space:nowrap;
}
.celebration-msg{
  position:fixed;inset:0;display:flex;align-items:center;justify-content:center;
  z-index:200;pointer-events:none;opacity:0;transition:opacity .5s;
}
.celebration-msg.show{opacity:1}
.celebration-msg span{
  font-family:'Playfair Display',serif;
  font-size:clamp(1.5rem,8vw,3rem);
  color:#ffd700;text-align:center;
  text-shadow:0 0 60px rgba(255,215,0,.8),0 4px 20px rgba(0,0,0,.8);
  padding:1rem 2rem;
  background:rgba(6,15,30,.7);
  border-radius:20px;
  border:1px solid rgba(255,215,0,.3);
}
</style>
</head>
<body>
<canvas id="stars-c"></canvas>
<canvas id="fw-canvas" class="fw-canvas"></canvas>

<div class="celebration-msg" id="celebMsg"><span>🎉 Sveika sugrįžus namo, sese! 🎉</span></div>

<div class="app">
<div class="content">
  <h1 class="title">✈️ Mūsų mylimiausios Ievos grįžimas iš Amsterdamo</h1>
  <p class="subtitle" id="subtitleTxt">Skaičiuojame likusį laiką...</p>

  <div class="countdown-row">
    <div class="cd-box"><div class="cd-num" id="cd-d">--</div><div class="cd-label">dienos</div></div>
    <div class="cd-box"><div class="cd-num" id="cd-h">--</div><div class="cd-label">valandos</div></div>
    <div class="cd-box"><div class="cd-num" id="cd-m">--</div><div class="cd-label">minutės</div></div>
    <div class="cd-box"><div class="cd-num" id="cd-s">--</div><div class="cd-label">sekundės</div></div>
  </div>

  <!-- MAP SVG -->
  <div class="map-wrap">
    <svg id="mapSvg" viewBox="0 0 560 210" xmlns="http://www.w3.org/2000/svg">
      <defs>
        <pattern id="nlFlag" patternUnits="userSpaceOnUse" x="20" y="30" width="80" height="90">
          <rect width="80" height="30" fill="#AE1C28"/>
          <rect y="30" width="80" height="30" fill="white"/>
          <rect y="60" width="80" height="30" fill="#21468B"/>
        </pattern>
        <pattern id="ltFlag" patternUnits="userSpaceOnUse" x="390" y="40" width="110" height="90">
          <rect width="110" height="30" fill="#FDB913"/>
          <rect y="30" width="110" height="30" fill="#006A44"/>
          <rect y="60" width="110" height="30" fill="#C1272D"/>
        </pattern>
        <filter id="mapGlow" x="-20%" y="-20%" width="140%" height="140%">
          <feGaussianBlur stdDeviation="2" result="blur"/>
          <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
        </filter>
        <clipPath id="faceClip"><circle cx="0" cy="0" r="9"/></clipPath>
      </defs>

      <!-- Netherlands (left) -->
      <g filter="url(#mapGlow)">
        <path id="nlShape"
          d="M28,55 L42,32 L62,28 L82,30 L96,38 L100,52 L98,68 L90,82 L80,100 L68,112 L50,118 L34,112 L22,98 L20,80 L24,65 Z"
          fill="url(#nlFlag)" stroke="rgba(255,255,255,0.7)" stroke-width="1.5"/>
        <text x="60" y="135" text-anchor="middle" fill="rgba(255,255,255,0.85)" font-size="12" font-family="Lato,sans-serif">🇳🇱 Amsterdamas</text>
      </g>

      <!-- Lithuania (right) -->
      <g filter="url(#mapGlow)">
        <path id="ltShape"
          d="M392,45 L418,38 L448,40 L470,48 L488,58 L492,75 L488,92 L472,108 L448,118 L420,122 L396,116 L380,100 L376,82 L380,65 Z"
          fill="url(#ltFlag)" stroke="rgba(255,255,255,0.7)" stroke-width="1.5"/>
        <text x="434" y="140" text-anchor="middle" fill="rgba(255,255,255,0.85)" font-size="12" font-family="Lato,sans-serif">🇱🇹 Lietuva</text>
      </g>

      <!-- Flight path — exact bezier the plane will follow -->
      <!-- Path: from NL center (60,72) through arc top (280,18) to LT center (434,80) -->
      <path id="flightPath"
        d="M60,72 C140,18 380,18 434,80"
        fill="none"
        stroke="rgba(255,215,0,0.4)"
        stroke-width="1.5"
        stroke-dasharray="7,5"/>

      <!-- Plane group — JS moves this along the path -->
      <g id="planeG" transform="translate(60,72)">
        <!-- Plane body -->
        <g id="planeInner" transform="rotate(0)">
          <!-- fuselage -->
          <ellipse cx="0" cy="0" rx="16" ry="6" fill="white" opacity=".97"/>
          <!-- nose -->
          <ellipse cx="12" cy="0" rx="6" ry="4.5" fill="#e8e8e8"/>
          <!-- tail fin -->
          <polygon points="-14,-6 -7,-13 -7,-6" fill="#ddd"/>
          <!-- left wing -->
          <polygon points="-4,-6 10,-6 6,0 -8,0" fill="white" opacity=".9"/>
          <!-- right wing -->
          <polygon points="-4,6 10,6 6,0 -8,0" fill="white" opacity=".9"/>
          <!-- window with face -->
          <circle cx="2" cy="0" r="9" fill="#b8d4f0" stroke="white" stroke-width=".5"/>
          <image id="faceImg"
            x="-9" y="-9" width="18" height="18"
            preserveAspectRatio="xMidYMid slice"
            clip-path="url(#faceClip)"
            href="IMG_4625.jpeg"/>
        </g>
      </g>
    </svg>
  </div>
  <!-- END MAP -->

  <div class="btn-row" id="btnRow">
    <button class="btn-welcome" id="btnWelcome">🎉 Sveika sugrįžus namo!</button>
    <div class="btn-ams-container" id="amsContainer" style="position:absolute;right:20px;bottom:0">
      <button class="btn-ams" id="btnAms">🛫 Grįžti į Amsterdamą</button>
    </div>
  </div>

</div>
</div>

<script>
// ── Stars ──────────────────────────────────────────────
const sc = document.getElementById('stars-c');
const sctx = sc.getContext('2d');
let starsList = [];
function resizeStars(){
  sc.width = window.innerWidth; sc.height = window.innerHeight;
  starsList = [];
  for(let i=0;i<120;i++){
    starsList.push({x:Math.random()*sc.width,y:Math.random()*sc.height,
      r:Math.random()*1.2+.3,a:Math.random(),da:(Math.random()*.008+.002)*(Math.random()<.5?1:-1)});
  }
}
resizeStars();
window.addEventListener('resize',resizeStars);
function drawStars(){
  sctx.clearRect(0,0,sc.width,sc.height);
  starsList.forEach(s=>{
    s.a+=s.da;if(s.a>1||s.a<0)s.da*=-1;
    sctx.beginPath();sctx.arc(s.x,s.y,s.r,0,Math.PI*2);
    sctx.fillStyle=`rgba(255,255,255,${s.a})`;sctx.fill();
  });
  requestAnimationFrame(drawStars);
}
drawStars();

// ── Countdown ──────────────────────────────────────────
const TARGET = new Date('2026-06-15T12:00:00');
const prev = {d:null,h:null,m:null,s:null};
function bump(id){
  const el=document.getElementById(id);
  el.classList.remove('bump');void el.offsetWidth;el.classList.add('bump');
  setTimeout(()=>el.classList.remove('bump'),150);
}
function updateCD(){
  const now=new Date();let diff=TARGET-now;
  if(diff<=0){
    ['cd-d','cd-h','cd-m','cd-s'].forEach(id=>document.getElementById(id).textContent='00');
    document.getElementById('subtitleTxt').textContent='🎉 Sesė jau namie!';
    return;
  }
  const d=Math.floor(diff/86400000);diff%=86400000;
  const h=Math.floor(diff/3600000);diff%=3600000;
  const m=Math.floor(diff/60000);diff%=60000;
  const s=Math.floor(diff/1000);
  const fmt=n=>String(n).padStart(2,'0');
  if(d!==prev.d){document.getElementById('cd-d').textContent=fmt(d);if(prev.d!==null)bump('cd-d');prev.d=d;}
  if(h!==prev.h){document.getElementById('cd-h').textContent=fmt(h);if(prev.h!==null)bump('cd-h');prev.h=h;}
  if(m!==prev.m){document.getElementById('cd-m').textContent=fmt(m);if(prev.m!==null)bump('cd-m');prev.m=m;}
  if(s!==prev.s){document.getElementById('cd-s').textContent=fmt(s);if(prev.s!==null)bump('cd-s');prev.s=s;}
}
updateCD();setInterval(updateCD,1000);

// ── Plane along bezier path ────────────────────────────
// Path: M60,72 C140,18 380,18 434,80
const P0={x:60,y:72},CP1={x:140,y:18},CP2={x:380,y:18},P1={x:434,y:80};
function bezier(t,p0,cp1,cp2,p1){
  const mt=1-t;
  return mt*mt*mt*p0 + 3*mt*mt*t*cp1 + 3*mt*t*t*cp2 + t*t*t*p1;
}
function bezierDeriv(t,p0,cp1,cp2,p1){
  const mt=1-t;
  return 3*mt*mt*(cp1-p0)+6*mt*t*(cp2-cp1)+3*t*t*(p1-cp2);
}
let planeT=0;
const planeG=document.getElementById('planeG');
const planeInner=document.getElementById('planeInner');
function animPlane(){
  planeT+=0.003;if(planeT>1)planeT=0;
  const x=bezier(planeT,P0.x,CP1.x,CP2.x,P1.x);
  const y=bezier(planeT,P0.y,CP1.y,CP2.y,P1.y);
  const dx=bezierDeriv(planeT,P0.x,CP1.x,CP2.x,P1.x);
  const dy=bezierDeriv(planeT,P0.y,CP1.y,CP2.y,P1.y);
  const angle=Math.atan2(dy,dx)*180/Math.PI;
  planeG.setAttribute('transform',`translate(${x},${y})`);
  planeInner.setAttribute('transform',`rotate(${angle})`);
  requestAnimationFrame(animPlane);
}
animPlane();

// ── Dodge button ───────────────────────────────────────
const amsContainer=document.getElementById('amsContainer');
const btnRow=document.getElementById('btnRow');
const btnAms=document.getElementById('btnAms');
let dodgeTimeout;
let dodgeActive=false;

function dodgeAms(e){
  e.preventDefault();
  
  // Clear any pending dodge timeout
  if(dodgeTimeout) clearTimeout(dodgeTimeout);
  
  // Prevent dodge spam
  if(dodgeActive) return;
  dodgeActive=true;
  
  const rowRect=btnRow.getBoundingClientRect();
  const btnW=amsContainer.offsetWidth||120;
  const btnH=amsContainer.offsetHeight||44;
  
  // Calculate available space with larger margins
  const margin=50;
  const maxX=Math.max(0, rowRect.width-btnW-margin);
  const maxY=Math.max(0, rowRect.height-btnH-margin);
  
  // Generate random position, avoiding current position
  let nx, ny, distance;
  do {
    nx=margin+Math.random()*Math.max(0,maxX-margin);
    ny=margin+Math.random()*Math.max(0,maxY-margin);
    const currentX=parseInt(amsContainer.style.left||0);
    const currentY=parseInt(amsContainer.style.top||0);
    distance=Math.sqrt((nx-currentX)**2+(ny-currentY)**2);
  } while(distance<100); // Ensure significant movement
  
  amsContainer.style.position='absolute';
  amsContainer.style.left=nx+'px';
  amsContainer.style.top=ny+'px';
  amsContainer.style.transition='left .1s ease,top .1s ease';
  
  // Re-enable dodging after short cooldown
  dodgeTimeout=setTimeout(()=>{dodgeActive=false;},150);
}

// Dodge on any interaction attempt
btnAms.addEventListener('mouseenter',dodgeAms);
btnAms.addEventListener('mousemove',dodgeAms);
btnAms.addEventListener('mousedown',(e)=>{e.preventDefault();dodgeAms(e);});
btnAms.addEventListener('touchstart',dodgeAms,{passive:false});
btnAms.addEventListener('touchmove',dodgeAms,{passive:false});

btnRow.style.minHeight='100px';
amsContainer.style.position='absolute';
amsContainer.style.right='10px';
amsContainer.style.bottom='5px';

// ── Fireworks ──────────────────────────────────────────
const fwc=document.getElementById('fw-canvas');
const fctx=fwc.getContext('2d');
function resizeFw(){fwc.width=window.innerWidth;fwc.height=window.innerHeight;}
resizeFw();window.addEventListener('resize',resizeFw);
let fwParticles=[];let fwRunning=false;
const FW_COLORS=['#ffd700','#ff4f4f','#4fff88','#4f88ff','#ff88ff','#ffaa00','#00ffcc','#ffffff','#ff6600'];
class FWParticle{
  constructor(x,y,color){
    this.x=x;this.y=y;this.color=color;
    this.vx=(Math.random()-.5)*10;
    this.vy=(Math.random()-.5)*10-2;
    this.alpha=1;this.size=2+Math.random()*3;this.gravity=.1;
  }
  update(){this.x+=this.vx;this.y+=this.vy;this.vy+=this.gravity;this.alpha-=.016;}
  draw(){
    fctx.save();fctx.globalAlpha=Math.max(0,this.alpha);
    fctx.fillStyle=this.color;fctx.beginPath();
    fctx.arc(this.x,this.y,this.size,0,Math.PI*2);fctx.fill();fctx.restore();
  }
}
function fwExplode(x,y){
  const c=FW_COLORS[Math.floor(Math.random()*FW_COLORS.length)];
  for(let i=0;i<90;i++)fwParticles.push(new FWParticle(x,y,c));
}
function fwLoop(){
  fctx.clearRect(0,0,fwc.width,fwc.height);
  fwParticles=fwParticles.filter(p=>p.alpha>0);
  fwParticles.forEach(p=>{p.update();p.draw();});
  if(fwRunning||fwParticles.length>0)requestAnimationFrame(fwLoop);
}
const celebMsg=document.getElementById('celebMsg');
document.getElementById('btnWelcome').addEventListener('click',()=>{
  if(fwRunning)return;
  fwRunning=true;fwParticles=[];resizeFw();fwLoop();
  celebMsg.classList.add('show');
  let shots=0;
  const iv=setInterval(()=>{
    shots++;
    const x=80+Math.random()*(fwc.width-160);
    const y=30+Math.random()*(fwc.height*.55);
    fwExplode(x,y);
    if(shots>=20){clearInterval(iv);fwRunning=false;}
  },300);
  setTimeout(()=>celebMsg.classList.remove('show'),5000);
});
</script>
</body>
</html>
